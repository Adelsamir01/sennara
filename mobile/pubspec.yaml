name: sennara
version: 0.1.0+1
publish_to: none
description: Sennara — Egyptian fishing community

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.7.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  location: ^7.0.0
  image_picker: ^1.1.2
  http: ^1.2.1
  shared_preferences: ^2.2.3
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/lang/ar.json
    - assets/lang/en.json
